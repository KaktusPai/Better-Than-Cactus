# Accessibility option that disables FOV from
# changing when under speed penalties from this mod
# Default: false
fovScaling = false

# Player makes pain sounds when health is very low,
# emulating behavior from earlier versions of BTW
# Default: false
painSounds = false

# Toggles whether pain sounds should play when the player is sneaking
# Default: false
sneakingPainSounds = false

# Alters action exhaustion values to better
# match those seen in Better Than Wolves
# Default: true
hardcoreExhaustion = true

# Introduces debuffs as your hunger gets lower.
# Default: true
hungerPenalties = true

# Introduces debuffs as your health gets lower.
# Default: true
healthPenalties = true

# Introduces debuffs as your fat increases.
# This only works if Granular Hunger mod is installed.
# Default: true
fatPenalties = true

# Naturally regenerate half a heart every 600 ticks.
# This operates on top of vanilla regen/saturation mechanics
# Default: true
naturalRegen = true

# Set the hunger level at which sprinting should be disabled.
# Each whole point equals half a hunger shank, up to maximum 20.0 (10 shanks)
# Default: 8.0
sprintingDisabledHungerLevel = 8.0

